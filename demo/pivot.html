<script>
(function(){
  const params=new URLSearchParams(location.search);
  if(!params.has('embed'))return;
  // Remove all audio elements immediately to prevent any playback
  document.addEventListener('DOMContentLoaded',()=>{
    document.body.classList.add('embed-mode');
    document.querySelectorAll('audio').forEach(a=>a.remove());
    const nav=document.querySelector('.site-nav');if(nav)nav.style.display='none';

  });
  // Force audioMuted=true as soon as the main script sets it
  Object.defineProperty(window,'audioMuted',{value:true,writable:true,configurable:true});
  // Override playNarration to be a no-op in embed mode
  window.addEventListener('load',()=>{window.playNarration=function(){}});
})();

<script>
const SCENES=[
  {name:'Search & Browse Modules',duration:8000},
  {name:'Select P&L View',duration:6000},
  {name:'Open Pivot Dialogue',duration:5000},
  {name:'Configure Dimensions',duration:10000},
  {name:'Select Line Items',duration:8000},
  {name:'Select Time Periods',duration:6000},
  {name:'Execute & Write Data',duration:17000},
];
const TOTAL=SCENES.reduce((s,sc)=>s+sc.duration,0);
let playing=true,currentScene=0,sceneTimer=null,sceneStart=0,elapsed=0,animFrameId=null;

function togglePlay(){playing=!playing;document.getElementById('playBtn').textContent=playing?'⏸ Pause':'▶ Play';if(playing)runScene(currentScene)}
function restartDemo(){
  playing=true;document.getElementById('playBtn').textContent='⏸ Pause';
  currentScene=0;elapsed=0;clearTimeout(sceneTimer);cancelAnimationFrame(animFrameId);
  document.getElementById('pivotOverlay').classList.remove('visible');
  document.getElementById('gridTable').innerHTML='';
  document.getElementById('sheetTabs').innerHTML='<div class="sheet-tab active">Sheet1</div>';
  initGrid();updateProgress();runScene(0);
}
function updateProgress(){
  document.getElementById('globalProgress').style.width=Math.min((elapsed/TOTAL)*100,100)+'%';
  document.getElementById('stepNum').textContent=currentScene+1;
  document.getElementById('stepLabel').textContent=SCENES[currentScene]?.name||'Complete';
}
function runScene(idx){
  if(idx>=SCENES.length){
    currentScene=SCENES.length-1;updateProgress();
    if(new URLSearchParams(location.search).has('loop')){setTimeout(()=>restartDemo(),2000)}
    return}
  currentScene=idx;sceneStart=Date.now();updateProgress();playNarration(idx);
  [scene1,scene2,scene3,scene4,scene5,scene6,scene7][idx]();
  sceneTimer=setTimeout(()=>{elapsed+=SCENES[idx].duration;if(playing)runScene(idx+1)},SCENES[idx].duration);
  const tick=()=>{if(!playing)return;const se=Date.now()-sceneStart;document.getElementById('globalProgress').style.width=Math.min(((elapsed+se)/TOTAL)*100,100)+'%';if(se<SCENES[idx].duration)animFrameId=requestAnimationFrame(tick)};
  animFrameId=requestAnimationFrame(tick);
}
const wait=ms=>new Promise(r=>setTimeout(r,ms));

function initGrid(){
  const t=document.getElementById('gridTable');const L='ABCDEFGHIJKLMNO'.split('');
  let h='<thead><tr><th class="corner"></th>';L.forEach(l=>{h+=`<th class="col-header">${l}</th>`});
  h+='</tr></thead><tbody>';for(let r=1;r<=30;r++){h+=`<tr><td class="row-header">${r}</td>`;L.forEach(()=>{h+='<td></td>'});h+='</tr>'}h+='</tbody>';t.innerHTML=h;
}

function typeText(el,text,speed=50){
  return new Promise(resolve=>{let i=0;el.classList.add('type-cursor');
  const iv=setInterval(()=>{el.textContent=text.slice(0,++i);if(i>=text.length){clearInterval(iv);el.classList.remove('type-cursor');resolve()}},speed)});
}

// Scene 1: Sidebar with pivot tab, search for P&L
async function scene1(){
  const sb=document.getElementById('sidebarContent');
  sb.innerHTML=`

// Scene 5: Select line items
async function scene5(){
  const items=['Revenue','  SaaS Revenue','  Services Revenue','COGS','  Hosting & Infra','  Support Staff','Gross Margin','Operating Expenses','  R&D','  Sales & Marketing','  G&A','EBITDA'];
  const list=document.getElementById('lineItemsList');
  if(!list)return;
  let html='';
  items.forEach((item,i)=>{html+=`<div class="item-check" id="li${i}"><input type="checkbox" ${i<7?'':''}><span>${item}</span></div>`});
  list.innerHTML=html;
  // Check items one by one
  const toCheck=[0,1,3,6,7,11]; // Revenue, SaaS, COGS, Gross Margin, OpEx, EBITDA
  for(const idx of toCheck){
    await wait(600);
    const el=document.getElementById('li'+idx);
    el.querySelector('input').checked=true;
    el.classList.add('checked');
  }
  await wait(800);
  // Update chip count
  document.getElementById('rowsDims').querySelector('.dimension-chip-count').textContent='6';
}

// Scene 7: Execute → progress → grid fills
async function scene7(){
  await wait(500);
  document.getElementById('execBtn').style.transform='scale(0.97)';
  await wait(150);document.getElementById('execBtn').style.transform='';
  document.getElementById('pivotProgress').style.display='block';
  document.getElementById('execBtn').disabled=true;
  document.getElementById('execBtn').textContent='Executing...';

  const stages=[
    {pct:20,text:'Fetching metadata...',detail:'5 dimensions',time:'2s'},
    {pct:45,text:'Loading cell data...',detail:'288 cells',time:'4s'},
    {pct:70,text:'Building pivot grid...',detail:'6 rows × 5 cols',time:'6s'},
    {pct:90,text:'Applying formatting...',detail:'P&L hierarchy',time:'7s'},
    {pct:100,text:'Writing to sheet...',detail:'288 cells written',time:'8s'},
  ];
  for(const s of stages){
    await wait(900);
    document.getElementById('pivotBar').style.width=s.pct+'%';
    document.getElementById('pivotPct').textContent=s.pct+'%';
    document.getElementById('pivotStatusText').textContent=s.text;
    document.getElementById('pivotDetail').textContent=s.detail;
    document.getElementById('pivotTimeText').textContent=s.time;
  }
  await wait(600);
  document.getElementById('pivotBar').classList.add('complete');
  document.getElementById('pivotStatusText').textContent='✓ Pivot complete!';
  document.getElementById('pivotStatusText').style.color='#059669';
  await wait(1000);
  document.getElementById('pivotOverlay').classList.remove('visible');

  // Fill grid
  await wait(400);
  document.getElementById('sheetTabs').innerHTML='<div class="sheet-tab">Sheet1</div><div class="sheet-tab active">[P] P&L Statement</div>';
  const rows=[
    {l:'Revenue',cls:'h0',v:['13,140,000','14,410,000','15,200,000','16,050,000','58,800,000']},
    {l:'  SaaS Revenue',cls:'h1',v:['11,760,000','12,930,000','13,640,000','14,420,000','52,750,000']},
    {l:'COGS',cls:'h0',v:['(3,942,000)','(4,323,000)','(4,560,000)','(4,815,000)','(17,640,000)']},
    {l:'Gross Margin',cls:'h0 total-row',v:['9,198,000','10,087,000','10,640,000','11,235,000','41,160,000']},
    {l:'Operating Expenses',cls:'h0',v:['(6,420,000)','(6,795,000)','(7,030,000)','(7,280,000)','(27,525,000)']},
    {l:'EBITDA',cls:'h0 total-row',v:['2,778,000','3,292,000','3,610,000','3,955,000','13,635,000']},
  ];
  const cols=['','Q1 FY26','Q2 FY26','Q3 FY26','Q4 FY26','FY26 Total'];
  const t=document.getElementById('gridTable');
  let html='<thead><tr><th class="corner"></th>';
  'ABCDEF'.split('').forEach(l=>{html+=`<th class="col-header">${l}</th>`});
  html+='</tr><tr><th class="row-header">1</th>';
  for(let i=1;i<cols.length;i++)html+=`<th style="font-size:10px;font-weight:600;padding:3px 8px">${cols[i]}</th>`;
  html+='<th></th></tr></thead><tbody id="gridBody"></tbody>';
  t.innerHTML=html;
  const body=document.getElementById('gridBody');
  for(let r=0;r<rows.length;r++){
    await wait(200);
    const row=rows[r];let tr=`<tr><td class="row-header">${r+2}</td><td class="${row.cls}">${row.l}</td>`;
    row.v.forEach(v=>{const neg=v.startsWith('(');tr+=`<td class="${row.cls} num${neg?' neg':''}">${v}</td>`});
    tr+='</tr>';body.insertAdjacentHTML('beforeend',tr);
  }
  document.getElementById('cellRef').textContent='D4';
  document.getElementById('formulaText').textContent='10,087,000';
}

// === Audio Narration ===
let audioMuted = false;
const audioClips = [document.getElementById('audio-1'),document.getElementById('audio-2'),document.getElementById('audio-3'),document.getElementById('audio-4'),document.getElementById('audio-5'),document.getElementById('audio-6'),document.getElementById('audio-7')];
function toggleMute(){
  audioMuted = !audioMuted;
  document.getElementById('muteBtn').textContent = audioMuted ? '🔇' : '🔊';
  if(audioMuted) audioClips.forEach(a => { a.pause(); a.currentTime = 0; });
}
function playNarration(idx){
  if(audioMuted || idx < 0 || idx >= audioClips.length) return;
  audioClips.forEach(a => { a.pause(); a.currentTime = 0; });
  audioClips[idx].play().catch(()=>{});
}

initGrid();
document.getElementById('sidebar').classList.add('visible');
setTimeout(()=>runScene(0),500);
</script>
