.msg-ai .bubble{background:#fff;border:1.5px solid #e5e7eb;color:#1F2937;padding:8px 14px;border-radius:4px 18px 18px 18px;font-size:13px;max-width:85%;line-height:1.6;box-shadow:0 1px 4px rgba(0,0,0,0.06)}

.config-card .cfg-label{color:#6B7280;font-weight:500;min-width:80px;font-size:11px;padding-top:1px}

.writing-indicator{display:flex;align-items:center;gap:8px;background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:8px 14px;font-size:12px;color:#92400e;font-weight:500;margin-top:8px}

<script>
const SCENES=[
  {name:'Discovery Tab',duration:6000},
  {name:'Explore Model',duration:5000},
  {name:'Crawling Modules',duration:10000},
  {name:'Module Tree Results',duration:8000},
  {name:'Expand Module Details',duration:8000},
  {name:'Search & Filter',duration:13000},
  {name:'Ask About Your Model',duration:12000},
  {name:'Natural Language to Sheet',duration:15000},
];
const TOTAL=SCENES.reduce((s,sc)=>s+sc.duration,0);
let playing=true,currentScene=0,sceneTimer=null,sceneStart=0,elapsed=0,animFrameId=null;

function togglePlay(){playing=!playing;document.getElementById('playBtn').textContent=playing?'⏸ Pause':'▶ Play';if(playing)runScene(currentScene)}
function restartDemo(){
  playing=true;document.getElementById('playBtn').textContent='⏸ Pause';
  currentScene=0;elapsed=0;clearTimeout(sceneTimer);cancelAnimationFrame(animFrameId);
  document.getElementById('discOverlay').classList.remove('visible');
  updateProgress();runScene(0);
}
function updateProgress(){
  document.getElementById('globalProgress').style.width=Math.min((elapsed/TOTAL)*100,100)+'%';
  document.getElementById('stepNum').textContent=currentScene+1;
  document.getElementById('stepLabel').textContent=SCENES[currentScene]?.name||'Complete';
}
function runScene(idx){
  if(idx>=SCENES.length){
    currentScene=SCENES.length-1;updateProgress();
    if(new URLSearchParams(location.search).has('loop')){setTimeout(()=>restartDemo(),2000)}
    return
  }
  currentScene=idx;sceneStart=Date.now();updateProgress();playNarration(idx);
  [scene1,scene2,scene3,scene4,scene5,scene6,scene7,scene8][idx]();
  sceneTimer=setTimeout(()=>{elapsed+=SCENES[idx].duration;if(playing)runScene(idx+1)},SCENES[idx].duration);
  const tick=()=>{if(!playing)return;const se=Date.now()-sceneStart;document.getElementById('globalProgress').style.width=Math.min(((elapsed+se)/TOTAL)*100,100)+'%';if(se<SCENES[idx].duration)animFrameId=requestAnimationFrame(tick)};
  animFrameId=requestAnimationFrame(tick);
}
const wait=ms=>new Promise(r=>setTimeout(r,ms));

function initGrid(){
  const t=document.getElementById('gridTable');const L='ABCDEFGHIJ'.split('');
  let h='<thead><tr><th class="corner"></th>';L.forEach(l=>{h+=`<th class="col-header">${l}</th>`});
  h+='</tr></thead><tbody>';for(let r=1;r<=25;r++){h+=`<tr><td class="row-header">${r}</td>`;L.forEach(()=>{h+='<td></td>'});h+='</tr>'}h+='</tbody>';t.innerHTML=h;
}

function typeText(el,text,speed=50){
  return new Promise(resolve=>{let i=0;el.classList.add('type-cursor');
  const iv=setInterval(()=>{el.textContent=text.slice(0,++i);if(i>=text.length){clearInterval(iv);el.classList.remove('type-cursor');resolve()}},speed)});
}

// Scene 1: Discovery tab in sidebar
async function scene1(){
  initGrid();
  const sb=document.getElementById('sidebarContent');
  sb.innerHTML=`
    <div style="background:var(--ios-surface);padding:16px;border-radius:12px;border:1px solid var(--ios-border);text-align:center">
      <div style="font-size:32px;margin-bottom:8px">🔍</div>
      <div style="font-size:16px;font-weight:600;color:var(--ios-text-primary);margin-bottom:4px">Model Discovery</div>
      <div style="font-size:12px;color:var(--ios-text-secondary);margin-bottom:16px">Explore the full architecture of your Anaplan model — modules, line items, dimensions, and relationships.</div>
      <div style="background:#f0fdf4;border-radius:8px;padding:8px;margin-bottom:12px;font-size:11px;color:#059669;font-weight:500">
        Model: Revenue & Headcount<br>FY26 Planning • Acme Corp
      </div>
      <button class="btn-primary" id="exploreBtn" style="background:linear-gradient(135deg,#00C7BE,#0891B2)">🔍 Explore Model Architecture</button>
    </div>
  `;
  await wait(2000);
  document.getElementById('exploreBtn').style.boxShadow='0 4px 20px rgba(0,199,190,0.4)';
}

// Scene 2: Click explore → dialog opens
async function scene2(){
  await wait(800);
  const btn=document.getElementById('exploreBtn');
  btn.style.transform='scale(0.97)';await wait(150);btn.style.transform='';
  await wait(500);
  document.getElementById('discOverlay').classList.add('visible');
  document.getElementById('discTitle').textContent='Model Architecture';
  document.getElementById('discSubtitle').textContent='Revenue & Headcount — FY26 Planning';
  document.getElementById('discBody').innerHTML=`
    <div class="crawl-progress" id="crawlProgress">
      <div style="width:48px;height:48px;border:4px solid #f3f4f6;border-top-color:#00C7BE;border-radius:50%;animation:ios-spin 1s linear infinite;margin:0 auto 16px"></div>
      <div style="font-size:15px;font-weight:600;color:#1F2937" id="crawlLabel">Initializing discovery...</div>
      <div class="crawl-bar-wrap"><div class="crawl-bar" id="crawlBar"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#6B7280">
        <span id="crawlDetail">Starting...</span>
        <span id="crawlPct">0%</span>
      </div>
    </div>
  `;
  document.getElementById('discFooter').innerHTML=`<span style="font-size:11px;color:#9ca3af">This may take a moment for large models</span>`;
}

// Scene 3: Crawl progress
async function scene3(){
  const stages=[

// Scene 6: Search/filter
async function scene6(){
  await wait(1500);
  const searchInput=document.getElementById('discSearchInput');
  await typeText(searchInput,'Revenue',60);
  await wait(800);
  // Filter to show only matching
  const tree=document.getElementById('moduleTree');
  const items=tree.querySelectorAll('.mod-tree-item');
  items.forEach(item=>{
    const name=item.querySelector('.mod-name').textContent;
    if(!name.toLowerCase().includes('rev')&&!name.includes('P&L')){
      item.style.opacity='0.3';
      item.style.transform='scale(0.98)';
    } else {
      item.style.opacity='1';
      item.style.borderColor='#00C7BE';
    }
  });

  await wait(3000);
  // Clear search
  searchInput.textContent='';
  searchInput.classList.remove('type-cursor');
  items.forEach(item=>{
    item.style.opacity='1';
    item.style.transform='';
    item.style.borderColor='';
  });

  // Search for specific line item
  await wait(1000);
  await typeText(searchInput,'EBITDA',60);
  await wait(1200);
  // Highlight matching
  items.forEach(item=>{
    const body=item.querySelector('.mod-tree-body');
    if(body){
      const lis=body.querySelectorAll('.li-item');
      let hasMatch=false;
      lis.forEach(li=>{
        if(li.querySelector('.li-name').textContent.includes('EBITDA')){
          li.style.background='#fef3c7';
          li.style.borderRadius='6px';
          hasMatch=true;
        }
      });
      if(!hasMatch){
        item.style.opacity='0.3';
      } else {
        item.classList.add('open');
        item.style.borderColor='#d97706';
      }
    }
  });
}

// Scene 8: Natural Language to Sheet
async function scene8(){

  document.querySelectorAll('.mod-tree-item').forEach(el=>{

  });

  // Reuse existing input field from scene 7 chat UI

  const messagesEl=document.getElementById('aiMessages');

  if(inputField) inputField.classList.add('type-cursor');
  if(inputField) inputField.textContent='';

  await wait(800);
  if(inputField) await typeText(inputField,'Pull Q1 revenue by department to my sheet',45);
  await wait(400);

  // Add user bubble
  if(messagesEl){
    messagesEl.insertAdjacentHTML('beforeend',`
      <div class="msg-user"><div class="bubble">Pull Q1 revenue by department to my sheet</div></div>
    `);
    if(inputField){inputField.textContent='';inputField.classList.remove('type-cursor')}

    // Thinking
    messagesEl.insertAdjacentHTML('beforeend',`
      <div class="msg-ai" id="thinkingMsg2">
        <div class="ai-avatar">✨</div>
        <div class="bubble"><div class="thinking-dots"><span></span><span></span><span></span></div></div>
      </div>
    `);
    messagesEl.scrollTop=messagesEl.scrollHeight;
    await wait(1300);
    document.getElementById('thinkingMsg2').remove();

    // Config card response
    messagesEl.insertAdjacentHTML('beforeend',`
      <div class="msg-ai" id="aiRespMsg2">
        <div class="ai-avatar">✨</div>
        <div class="bubble" id="aiRespBubble2">
          <span id="setupText"></span>
        </div>
      </div>
    `);
    messagesEl.scrollTop=messagesEl.scrollHeight;

    const setupText=document.getElementById('setupText');
    await typeText(setupText,"I'll set that up for you:",30);
    await wait(300);

    const bubble2=document.getElementById('aiRespBubble2');
    bubble2.insertAdjacentHTML('beforeend',`
      <div class="config-card" id="configCard" style="opacity:0;transition:opacity .5s;margin-top:8px">
        <div class="cfg-row"><span class="cfg-label">Module</span><span class="cfg-val">REV01 Revenue Planning</span></div>
        <div class="cfg-row"><span class="cfg-label">Line Items</span><span class="cfg-val">Total Revenue, SaaS Revenue, Services Revenue</span></div>
        <div class="cfg-row"><span class="cfg-label">Rows</span><span class="cfg-val">Department (Engineering, Sales, Marketing, Support, Operations)</span></div>
        <div class="cfg-row"><span class="cfg-label">Columns</span><span class="cfg-val">Jan 26, Feb 26, Mar 26</span></div>
        <div class="cfg-row"><span class="cfg-label">Version</span><span class="cfg-val">Working</span></div>
      </div>
      <div class="writing-indicator" id="writingIndicator" style="display:none">
        <span>⏳</span>
        <span>Writing to Sheet...</span>
        <div class="writing-bar-wrap"><div class="writing-bar" id="writingBar"></div></div>
      </div>
    `);
    await wait(100);
    document.getElementById('configCard').style.opacity='1';
    messagesEl.scrollTop=messagesEl.scrollHeight;

    await wait(1200);

    // Show writing indicator
    const writingIndicator=document.getElementById('writingIndicator');
    writingIndicator.style.display='flex';
    messagesEl.scrollTop=messagesEl.scrollHeight;

    // Animate progress bar
    const writingBar=document.getElementById('writingBar');
    const pcts=[20,45,70,90,100];
    for(const pct of pcts){
      await wait(300);
      writingBar.style.width=pct+'%';
    }
    await wait(400);
  }

  // Close the dialog
  document.getElementById('discOverlay').classList.remove('visible');
  await wait(600);

  // Populate the grid with financial data
  const depts=['Engineering','Sales','Marketing','Support','Operations'];
  const jan=[1245000,2380000,890000,425000,310000];
  const feb=[1310000,2510000,940000,445000,325000];
  const mar=[1390000,2650000,1010000,470000,342000];

  const table=document.getElementById('gridTable');
  const rows=table.querySelectorAll('tbody tr');
  const fmt=n=>n.toLocaleString();

  // Headers row 1: blank, Jan 26, Feb 26, Mar 26
  const headerRow=rows[0];
  const headerCells=headerRow.querySelectorAll('td');
  if(headerCells.length>=4){
    headerCells[1].textContent='Jan 26';headerCells[1].style.fontWeight='600';headerCells[1].style.color='#374151';
    headerCells[2].textContent='Feb 26';headerCells[2].style.fontWeight='600';headerCells[2].style.color='#374151';
    headerCells[3].textContent='Mar 26';headerCells[3].style.fontWeight='600';headerCells[3].style.color='#374151';
  }

  // Data rows
  for(let i=0;i<depts.length;i++){
    await wait(180);
    const row=rows[i+1];
    if(!row)continue;
    const cells=row.querySelectorAll('td');
    if(cells.length<4)continue;
    cells[0].textContent=depts[i];cells[0].style.fontWeight='500';cells[0].style.color='#374151';
    cells[1].textContent=fmt(jan[i]);cells[1].classList.add('grid-data-cell');
    cells[2].textContent=fmt(feb[i]);cells[2].classList.add('grid-data-cell');
    cells[3].textContent=fmt(mar[i]);cells[3].classList.add('grid-data-cell');
    // Also make row-header styled
    const rowHeader=row.querySelector('.row-header');
    if(rowHeader) rowHeader.style.background='#e8fdf0';
  }

  // Also style header cells green
  if(headerCells&&headerCells.length>=4){
    headerCells[1].classList.add('grid-data-cell');
    headerCells[2].classList.add('grid-data-cell');
    headerCells[3].classList.add('grid-data-cell');
  }

  // Toast notification
  await wait(500);
  document.body.insertAdjacentHTML('beforeend',`
    <div class="toast-notif" id="successToast">✓ Data written to Sheet1</div>
  `);
  await wait(3000);
  const toast=document.getElementById('successToast');
  if(toast){toast.style.transition='opacity .4s';toast.style.opacity='0';setTimeout(()=>toast.remove(),400)}
}

// === Audio Narration ===
let audioMuted = false;
const audioClips = [document.getElementById('audio-1'),document.getElementById('audio-2'),document.getElementById('audio-3'),document.getElementById('audio-4'),document.getElementById('audio-5'),document.getElementById('audio-6'),document.getElementById('audio-7'),document.getElementById('audio-8')];
function toggleMute(){
  audioMuted = !audioMuted;
  document.getElementById('muteBtn').textContent = audioMuted ? '🔇' : '🔊';
  if(audioMuted) audioClips.forEach(a => { a.pause(); a.currentTime = 0; });
}
function playNarration(idx){
  if(audioMuted || idx < 0 || idx >= audioClips.length) return;
  audioClips.forEach(a => { a.pause(); a.currentTime = 0; });
  audioClips[idx].play().catch(()=>{});
}

initGrid();
document.getElementById('sidebar').classList.add('visible');
setTimeout(()=>runScene(0),500);
</script>
