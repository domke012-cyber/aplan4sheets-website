.ctrl-play{background:#0f9d58;color:#fff}.ctrl-play:hover{background:#0b8a4a}

.ctrl-mute{background:#e5e7eb;color:#374151;font-size:16px;padding:6px 12px}.ctrl-mute:hover{background:#d1d5db}
.step-indicator{font-size:13px;color:#6b7280;font-weight:500}.step-indicator .current{color:#1a2744;font-weight:700}
.global-progress{height:3px;background:#e5e7eb;position:relative}
.global-progress-fill{height:100%;background:linear-gradient(90deg,#0f9d58,#34a853);width:0%;transition:width .4s ease}
.browser-frame{display:flex;flex-direction:column;height:calc(100vh - 56px);background:#fff;overflow:hidden}
.sheets-toolbar{display:flex;align-items:center;gap:8px;padding:4px 12px;background:#1e8e3e;height:40px;color:#fff;font-size:13px;font-weight:500}

.main-area{display:flex;flex:1;overflow:hidden}
.grid-area{flex:1;position:relative;background:#fff;overflow:hidden}
.sheet-tabs{display:flex;align-items:center;height:28px;background:#f1f3f4;border-top:1px solid #dadce0;padding:0 8px;gap:2px;font-size:12px;color:#5f6368}

.grid-container{position:absolute;top:0;left:0;right:0;bottom:28px;overflow:hidden}
.grid-table{border-collapse:collapse;font-size:11px;font-family:'Inter',-apple-system,sans-serif}
.grid-table th{background:#f8f9fa;border:1px solid #e0e0e0;padding:2px 6px;font-weight:500;color:#5f6368;position:sticky;top:0;z-index:2;white-space:nowrap;min-width:32px}

.ext-dropdown.show{opacity:1;transform:translateY(0)}

/* Connector UI */
.connector-ui{
  --ios-primary:#007AFF;--ios-success:#30D158;--ios-warning:#FF9F0A;--ios-danger:#FF453A;
  --ios-bg-primary:#FFFFFF;--ios-surface:rgba(255,255,255,0.85);--ios-surface-elevated:rgba(255,255,255,0.95);
  --ios-glass:rgba(255,255,255,0.78);--ios-glass-thick:rgba(248,248,248,0.92);
  --ios-text-primary:rgba(0,0,0,1);--ios-text-secondary:rgba(60,60,67,0.85);--ios-text-tertiary:rgba(60,60,67,0.6);--ios-text-inverse:rgba(255,255,255,1);
  --ios-border:rgba(60,60,67,0.25);--ios-border-light:rgba(60,60,67,0.15);--ios-separator:rgba(60,60,67,0.18);
  --ios-shadow-sm:0 2px 8px rgba(0,0,0,0.06);--ios-shadow-md:0 4px 20px rgba(0,0,0,0.10);
  --ios-radius-xs:6px;--ios-radius-sm:8px;--ios-radius-md:12px;--ios-radius-pill:100px;
  --ios-ease:cubic-bezier(0.25,0.46,0.45,0.94);--ios-transition:all 0.2s cubic-bezier(0.25,0.46,0.45,0.94);
  --ios-blue-gradient:linear-gradient(135deg,#5E5CE6,#007AFF);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-size:14px;color:var(--ios-text-primary);-webkit-font-smoothing:antialiased;
  background:linear-gradient(135deg,#E8F4FD 0%,#FFF4E6 25%,#F3E7FF 50%,#E6F7FF 75%,#FFF0F5 100%);background-size:400% 400%;animation:meshGradient 15s ease infinite;line-height:1.4;
}
@keyframes meshGradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.connector-ui .ios-toggle-menu{margin:12px 0;background:var(--ios-surface-elevated);border-radius:var(--ios-radius-md);border:1px solid var(--ios-border);overflow:hidden;box-shadow:var(--ios-shadow-sm);transition:var(--ios-transition)}
.connector-ui .ios-toggle-header{padding:8px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.8);border-bottom:1px solid transparent;transition:var(--ios-transition);min-height:32px}
.connector-ui .ios-toggle-title{display:flex;justify-content:space-between;align-items:center;flex:1;gap:12px}
.connector-ui .ios-toggle-label{font-size:12px;font-weight:500;color:var(--ios-text-secondary)}
.connector-ui .ios-toggle-value{font-size:12px;font-weight:600;color:var(--ios-primary)}
.connector-ui .ios-toggle-chevron{width:10px;height:10px;transition:transform .2s var(--ios-ease);color:var(--ios-text-tertiary);margin-left:8px}
.connector-ui .ios-toggle-chevron::after{content:'';display:block;width:6px;height:6px;border-right:1.5px solid currentColor;border-bottom:1.5px solid currentColor;transform:rotate(45deg);margin-top:-2px}
.connector-ui .ios-toggle-menu.expanded .ios-toggle-chevron{transform:rotate(180deg)}
.connector-ui .ios-toggle-menu.expanded .ios-toggle-header{border-bottom:1px solid var(--ios-border)}
.connector-ui .ios-toggle-dropdown{display:none;background:var(--ios-glass);max-height:0;overflow:hidden;transition:max-height .3s var(--ios-ease)}
.connector-ui .ios-toggle-menu.expanded .ios-toggle-dropdown{display:block;max-height:200px}
.connector-ui .ios-toggle-option{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:var(--ios-transition);border-bottom:1px solid var(--ios-border-light)}
.connector-ui .ios-toggle-option:last-child{border-bottom:none}
.connector-ui .ios-toggle-option-text{font-size:12px;font-weight:500;color:var(--ios-text-primary);flex:1}
.connector-ui .ios-toggle-option-badge{font-size:10px;font-weight:600;color:var(--ios-success);text-transform:uppercase;letter-spacing:.5px;margin-right:12px}
.connector-ui .ios-toggle-option-check{width:20px;height:20px;color:var(--ios-primary);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center}
.connector-ui .ios-toggle-option.selected{background:rgba(0,122,255,0.05)}
.connector-ui .ios-login-button{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;min-width:200px;min-height:44px;font-family:inherit;font-size:15px;font-weight:600;letter-spacing:-.2px;color:white;background:linear-gradient(135deg,#007AFF 0%,#5E5CE6 100%);border:none;border-radius:12px;margin:8px auto 20px auto;cursor:pointer;overflow:hidden;transition:all .3s var(--ios-ease);box-shadow:0 4px 15px rgba(0,122,255,0.3),inset 0 1px 0 rgba(255,255,255,0.2)}
.connector-ui .ios-login-button.loading{pointer-events:none;animation:subtle-pulse 2s cubic-bezier(.4,0,.6,1) infinite}
@keyframes subtle-pulse{0%,100%{opacity:1}50%{opacity:.85}}
.connector-ui .ios-login-spinner{display:inline-block;width:14px;height:14px;border:2px solid transparent;border-top-color:white;border-radius:50%;animation:ios-spin .8s linear infinite}
@keyframes ios-spin{to{transform:rotate(360deg)}}
.connector-ui .ios-user-banner{display:none;background:linear-gradient(135deg,#F3F4F6 0%,#E5E7EB 100%);border:1px solid rgba(0,0,0,0.08);border-radius:16px;padding:12px 16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06),inset 0 1px 0 rgba(255,255,255,0.8);animation:slideDown .4s var(--ios-ease)}
.connector-ui .ios-user-banner.show{display:flex;align-items:center;gap:12px;justify-content:space-between}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.connector-ui .user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#3B82F6 0%,#8B5CF6 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(59,130,246,0.25)}
.connector-ui .user-initial{color:white;font-size:16px;font-weight:600;text-transform:uppercase}
.connector-ui .user-details{flex:1;display:flex;flex-direction:column;gap:2px}
.connector-ui .user-name-line{display:flex;align-items:center;gap:6px}
.connector-ui .user-name{font-size:15px;font-weight:600;color:#1F2937;letter-spacing:-.2px}
.connector-ui .inline-checkmark{width:14px;height:14px;fill:#10B981;filter:drop-shadow(0 1px 2px rgba(16,185,129,0.2))}
.connector-ui .user-email{font-size:12px;color:#6B7280}
.connector-ui .banner-logout-btn{background:rgba(0,0,0,0.05);border:1px solid rgba(0,0,0,0.1);border-radius:8px;padding:6px 12px;color:#374151;font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0}
.connector-ui .btn-primary{background:var(--ios-primary);color:var(--ios-text-inverse);padding:8px 16px;border-radius:var(--ios-radius-sm);font-size:13px;min-height:32px;font-weight:600;box-shadow:var(--ios-shadow-sm),inset 0 1px 0 rgba(255,255,255,0.15);width:100%;border:none;cursor:pointer;font-family:inherit}
.connector-ui .btn-secondary{background:linear-gradient(135deg,#00C7BE,#0891B2);color:white;padding:6px 12px;border-radius:var(--ios-radius-xs);font-size:12px;min-height:28px;font-weight:600;box-shadow:0 2px 8px rgba(0,199,190,0.3);border:none;cursor:pointer;width:100%;font-family:inherit}
.connector-ui .btn-text{background:none;border:none;color:var(--ios-primary);font-size:12px;font-weight:500;cursor:pointer;padding:6px 8px;border-radius:var(--ios-radius-xs)}
.connector-ui .model-selection-panel{background:var(--ios-surface);padding:12px;border-radius:var(--ios-radius-md);margin-bottom:12px}
.connector-ui hr{border:0;border-top:1px solid #e8e8e8;margin:15px 0}
.fade-in{animation:fadeIn .4s ease forwards}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.type-cursor{border-right:2px solid var(--ios-primary);animation:blink 1s step-end infinite}
@keyframes blink{50%{border-color:transparent}}

/* Success badge */
.success-badge{display:inline-flex;align-items:center;gap:6px;background:#d1fae5;color:#059669;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;animation:slideDown .4s var(--ios-ease)}
</style>

<script>
(function(){
  const params=new URLSearchParams(location.search);
  if(!params.has('embed'))return;
  // Remove all audio elements immediately to prevent any playback
  document.addEventListener('DOMContentLoaded',()=>{
    document.body.classList.add('embed-mode');
    document.querySelectorAll('audio').forEach(a=>a.remove());
    const nav=document.querySelector('.site-nav');if(nav)nav.style.display='none';
    const ctrl=document.querySelector('.demo-controls');if(ctrl)ctrl.style.display='none';
    const prog=document.querySelector('.global-progress');if(prog)prog.style.display='none';
    document.body.style.overflow='hidden';
  });
  // Force audioMuted=true as soon as the main script sets it
  Object.defineProperty(window,'audioMuted',{value:true,writable:true,configurable:true});
  // Override playNarration to be a no-op in embed mode
  window.addEventListener('load',()=>{window.playNarration=function(){}});
})();
</script>

<script>
const SCENES=[
  {name:'Extensions Menu',duration:8000},
  {name:'Sidebar & Auth Toggle',duration:7000},
  {name:'Login with SSO',duration:8000},
  {name:'User Authenticated',duration:7000},
  {name:'Add Model Configuration',duration:15000},
];
const TOTAL=SCENES.reduce((s,sc)=>s+sc.duration,0);
let playing=true,currentScene=0,sceneTimer=null,sceneStart=0,elapsed=0,animFrameId=null;

const checkSVG=`<svg class="inline-checkmark" viewBox="0 0 16 16" style="width:14px;height:14px"><path d="M8 0C3.58 0 0 3.58 0 8s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8zm-1.5 12L3 8.5l1.06-1.06L6.5 9.88l5.44-5.44L13 5.5l-6.5 6.5z"/></svg>`;

function togglePlay(){playing=!playing;document.getElementById('playBtn').textContent=playing?'⏸ Pause':'▶ Play';if(playing)runScene(currentScene)}
function restartDemo(){
  playing=true;document.getElementById('playBtn').textContent='⏸ Pause';
  currentScene=0;elapsed=0;clearTimeout(sceneTimer);cancelAnimationFrame(animFrameId);
  document.getElementById('sidebar').classList.remove('visible');
  document.getElementById('sidebarContent').innerHTML='';
  document.getElementById('extDrop').classList.remove('show');
  document.getElementById('extSubDrop').classList.remove('show');
  updateProgress();runScene(0);
}
function updateProgress(){
  const pct=Math.min((elapsed/TOTAL)*100,100);
  document.getElementById('globalProgress').style.width=pct+'%';
  document.getElementById('stepNum').textContent=currentScene+1;
  document.getElementById('stepLabel').textContent=SCENES[currentScene]?.name||'Complete';
}
function runScene(idx){
  if(idx>=SCENES.length){
    currentScene=SCENES.length-1;updateProgress();
    if(new URLSearchParams(location.search).has('loop')){setTimeout(()=>restartDemo(),2000)}
    return}
  currentScene=idx;sceneStart=Date.now();updateProgress();playNarration(idx);
  [scene1,scene2,scene3,scene4,scene5][idx]();
  sceneTimer=setTimeout(()=>{elapsed+=SCENES[idx].duration;if(playing)runScene(idx+1)},SCENES[idx].duration);
  const tick=()=>{if(!playing)return;const se=Date.now()-sceneStart;const pct=Math.min(((elapsed+se)/TOTAL)*100,100);document.getElementById('globalProgress').style.width=pct+'%';if(se<SCENES[idx].duration)animFrameId=requestAnimationFrame(tick)};
  animFrameId=requestAnimationFrame(tick);
}
const wait=ms=>new Promise(r=>setTimeout(r,ms));

// Empty grid
function initGrid(){
  const t=document.getElementById('gridTable');const L='ABCDEFGHIJKLMNO'.split('');
  let h='<thead><tr><th class="corner"></th>';L.forEach(l=>{h+=`<th class="col-header">${l}</th>`});
  h+='</tr></thead><tbody>';for(let r=1;r<=30;r++){h+=`<tr><td class="row-header">${r}</td>`;L.forEach(()=>{h+='<td></td>'});h+='</tr>'}
  h+='</tbody>';t.innerHTML=h;
}

// Scene 1: Extensions menu opens
async function scene1(){
  await wait(800);
  document.getElementById('extMenuLabel').style.background='#e8f0fe';
  await wait(600);
  document.getElementById('extDrop').classList.add('show');
  await wait(1500);
  document.getElementById('extConnector').classList.add('highlighted');
  await wait(1000);
  document.getElementById('extSubDrop').classList.add('show');
  await wait(1500);
  document.getElementById('extOpenSidebar').classList.add('highlighted');
  await wait(1500);
  // Click effect
  document.getElementById('extDrop').classList.remove('show');
  document.getElementById('extSubDrop').classList.remove('show');
  document.getElementById('extMenuLabel').style.background='';
}

// Scene 2: Sidebar slides in with auth toggle
async function scene2(){
  const sb=document.getElementById('sidebarContent');
  sb.innerHTML=`
    <div style="text-align:center;padding:16px 0 8px">

  btn.classList.add('loading');
  btn.innerHTML='<span class="ios-login-spinner"></span> <span class="button-text">Authenticating...</span>';
  await wait(3000);
  btn.innerHTML='<span class="button-text">✓ Authentication Successful</span>';
  btn.style.background='linear-gradient(135deg,#30D158 0%,#34C759 100%)';

// === Audio Narration ===
let audioMuted = false;
const audioClips = [document.getElementById('audio-1'),document.getElementById('audio-2'),document.getElementById('audio-3'),document.getElementById('audio-4'),document.getElementById('audio-5')];
function toggleMute(){
  audioMuted = !audioMuted;
  document.getElementById('muteBtn').textContent = audioMuted ? '🔇' : '🔊';
  if(audioMuted) audioClips.forEach(a => { a.pause(); a.currentTime = 0; });
}
function playNarration(idx){
  if(audioMuted || idx < 0 || idx >= audioClips.length) return;
  audioClips.forEach(a => { a.pause(); a.currentTime = 0; });
  audioClips[idx].play().catch(()=>{});
}

initGrid();
setTimeout(()=>runScene(0),500);
